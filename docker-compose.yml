version: "3.9"

services:
  # Capa de Datos Locales (Mensajer?a y Cach?)
  redis:
    image: redis:7-alpine
    container_name: jes-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  scylladb:
    image: scylladb/scylla:5.4
    container_name: jes-scylladb
    ports:
      - "9042:9042"
    volumes:
      - scylla_data:/var/lib/scylla
    command: --smp 1 --memory 512M --overprovisioned 1
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESC KEYSPACES;'"]
      interval: 20s
      timeout: 10s
      retries: 10

  # Microservicios
  jes-core:
    build: ./jes-core
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"
    env_file: .env.development
    restart: unless-stopped

  jes-realtime:
    build: ./jes-realtime
    depends_on:
      redis:
        condition: service_healthy
      scylladb:
        condition: service_healthy
    ports:
      - "4001:4001"
    env_file: .env.development
    restart: unless-stopped

  jes-gateway:
    build: ./jes-vite
    depends_on:
      - jes-core
      - jes-realtime
    ports:
      - "3000:3000"
    env_file: .env.development
    restart: unless-stopped

volumes:
  redis_data:
  scylla_data:
